name: Sync Upstream & Auto Build

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write        # Yeh line zaroori hai — build trigger karne ke liye

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream & sync
        id: sync
        run: |
          git remote add upstream https://github.com/timmyy123/LLM-Hub.git
          git fetch upstream

          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "✅ Already up to date."
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "🔄 New commits found — syncing..."
            git merge upstream/main --no-edit --allow-unrelated-histories
            git push origin main
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      # Push ke baad explicitly build trigger karo
      - name: Trigger build workflow
        if: steps.sync.outputs.updated == 'true'
        run: |
          gh workflow run "Build LLM-Hub Release APK (Free & arm64)" --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}