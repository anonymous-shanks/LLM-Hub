name: Build LLM Hub APK (Free)

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Manually bhi trigger kar sako

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties with premium unlock
        working-directory: android
        run: |
          echo "DEBUG_PREMIUM=true" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # YAHAN HUMNE WOH PURANA FIX WAPAS ADD KIYA HAI 👇
      - name: Fix Merge Conflict Automatically
        working-directory: ./android/app
        run: |
          cat <<EOF >> build.gradle.kts
          
          android {
              packaging {
                  jniLibs {
                      pickFirsts.add("**/libonnxruntime.so")
                  }
              }
          }
          EOF

      - name: Build APK (arm64 only)
        working-directory: android
        run: ./gradlew assembleDebug -Pandroid.injected.abis=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LLM-Hub-free-arm64
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
