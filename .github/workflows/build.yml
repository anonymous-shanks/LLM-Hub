name: Build LLM-Hub Release APK (Free & arm64)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 1. Ye step Paywall hatayega (Premium Unlock)
      - name: Create local.properties with premium unlock
        working-directory: ./android
        run: |
          echo "DEBUG_PREMIUM=true" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        working-directory: ./android
        run: chmod +x ./gradlew

      # 2. Ye step size chota karega (Sirf arm64) aur conflict fix karega
      - name: Force arm64-v8a Release & Fix Conflicts
        working-directory: ./android/app
        run: |
          sed -i '/abiFilters/d' build.gradle.kts
          cat <<EOF >> build.gradle.kts
          
          android {
              splits {
                  abi {
                      isEnable = true
                      reset()
                      include("arm64-v8a")
                      isUniversalApk = false
                  }
              }
              packaging {
                  jniLibs {
                      pickFirsts.add("**/libonnxruntime.so")
                  }
              }
          }
          EOF

      # 3. Ye step ek choti aur fast 'Release' app banayega
      - name: Build Release APK
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Upload Stable arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: LLM-Hub-Premium-arm64-v8a-Release
          path: android/app/build/outputs/apk/release/*.apk
