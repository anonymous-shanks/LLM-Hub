name: Build LLM Hub Stable (arm64-v8a)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties with premium unlock
        working-directory: android
        run: |
          echo "DEBUG_PREMIUM=true" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Force arm64-v8a Release & Fix Conflicts
        working-directory: ./android/app
        run: |
          # Purane abiFilters ko delete karo taaki conflict na ho
          sed -i '/abiFilters/d' build.gradle.kts
          
          # Sirf arm64-v8a ka single chota APK banane ki setting
          cat <<EOF >> build.gradle.kts
          
          android {
              splits {
                  abi {
                      isEnable = true
                      reset()
                      include("arm64-v8a")
                      isUniversalApk = false
                  }
              }
              packaging {
                  jniLibs {
                      pickFirsts.add("**/libonnxruntime.so")
                  }
              }
          }
          EOF

      - name: Build Stable Release APK
        working-directory: android
        # assembleRelease se app shrink aur optimize hoga
        run: ./gradlew assembleRelease

      - name: Upload Stable arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: LLM-Hub-Stable-arm64-v8a
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
