name: Build LLM Hub (All Architectures)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties with premium unlock
        working-directory: android
        run: |
          echo "DEBUG_PREMIUM=true" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Enable APK Splits & Fix Conflicts
        working-directory: ./android/app
        run: |
          cat <<EOF >> build.gradle.kts
          
          android {
              splits {
                  abi {
                      isEnable = true
                      reset()
                      // Sirf in 4 architectures ke alag-alag APKs banenge
                      include("arm64-v8a", "armeabi-v7a", "x86", "x86_64")
                      // Universal (bada wala) APK generate nahi hoga
                      isUniversalApk = false
                  }
              }
              packaging {
                  jniLibs {
                      pickFirsts.add("**/libonnxruntime.so")
                  }
              }
          }
          EOF

      - name: Build All APK Splits
        working-directory: android
        # Yahan se humne specific ABI wala flag hata diya hai taaki sabhi splits build hon
        run: ./gradlew assembleDebug

      - name: Upload arm64-v8a (Narzo 70 Pro & modern devices)
        uses: actions/upload-artifact@v4
        with:
          name: LLM-Hub-arm64-v8a
          path: android/app/build/outputs/apk/debug/*arm64-v8a*.apk
          retention-days: 30

      - name: Upload armeabi-v7a (Older Androids)
        uses: actions/upload-artifact@v4
        with:
          name: LLM-Hub-armeabi-v7a
          path: android/app/build/outputs/apk/debug/*armeabi-v7a*.apk
          retention-days: 30

      - name: Upload x86_64 (Emulators/PCs)
        uses: actions/upload-artifact@v4
        with:
          name: LLM-Hub-x86_64
          path: android/app/build/outputs/apk/debug/*x86_64*.apk
          retention-days: 30
          
      - name: Upload x86 (Older Emulators)
        uses: actions/upload-artifact@v4
        with:
          name: LLM-Hub-x86
          path: android/app/build/outputs/apk/debug/*x86_*.apk
          retention-days: 30
